<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Graph Memory Simulator</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #f6f7fb;
  padding: 20px;
  color: #222;
}

.panel {
  background: #ffffff;
  border: 1px solid #e3e3e3;
  border-radius: 10px;
  padding: 16px;
}

.msg {
  font-size: 13px;
  line-height: 1.6;
  padding: 8px 12px;
  border-radius: 8px;
  margin-bottom: 8px;
  max-width: 88%;
}

.msg.user { background: #e7f0ff; margin-left: auto; }
.msg.ai { background: #f0f0f0; }
.msg.system { background: #fff3cd; font-style: italic; max-width: 100%; }

button {
  cursor: pointer;
  border: none;
  background: #5b6cff;
  color: white;
  border-radius: 6px;
  padding: 6px 12px;
}

button:hover { opacity: 0.9; }

input {
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  margin: 2px;
}

.tag-person { background: #EEEDFE; color: #3C3489; }
.tag-skill  { background: #E1F5EE; color: #085041; }
.tag-place  { background: #FAEEDA; color: #633806; }
.tag-org    { background: #FAECE7; color: #712B13; }

.edge-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 5px 8px;
  border-radius: 6px;
  background: #f3f3f3;
  margin-bottom: 4px;
}

.node-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.stat {
  text-align: center;
}

.stat-n {
  font-size: 20px;
  font-weight: bold;
}

.stat-l {
  font-size: 11px;
  color: #666;
}

</style>
</head>

<body>

<h2 style="margin-bottom:15px;">Interactive Graph Memory Simulator</h2>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">

  <div style="display:flex;flex-direction:column;gap:12px">
    <div class="panel">
      <div style="font-size:12px;font-weight:bold;margin-bottom:10px;">Conversation</div>
      <div id="chat" style="min-height:180px;max-height:260px;overflow-y:auto;margin-bottom:12px"></div>
      <div style="display:flex;gap:8px">
        <input id="inp" type="text" placeholder="Tell me something about yourself…" 
        style="flex:1" 
        onkeydown="if(event.key==='Enter')send()">
        <button onclick="send()">Send</button>
      </div>
    </div>

    <div class="panel">
      <div style="font-size:12px;font-weight:bold;margin-bottom:10px;">Extracted This Turn</div>
      <div id="extracted">Nothing yet — send a message above.</div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:12px">
    <div class="panel">
      <div style="font-size:12px;font-weight:bold;margin-bottom:10px;">Knowledge Graph</div>
      <canvas id="gc" width="400" height="300" style="width:100%"></canvas>
    </div>

    <div class="panel">
      <div style="font-size:12px;font-weight:bold;margin-bottom:8px;">Stored Edges</div>
      <div id="edges"></div>
    </div>
  </div>

</div>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;">
  <div class="panel stat"><div class="stat-n" id="sn">0</div><div class="stat-l">Nodes</div></div>
  <div class="panel stat"><div class="stat-n" id="se">0</div><div class="stat-l">Edges</div></div>
  <div class="panel stat"><div class="stat-n" id="st">0</div><div class="stat-l">Turns</div></div>
  <div class="panel stat" style="cursor:pointer" onclick="reset()">
    <div class="stat-n">Reset</div>
    <div class="stat-l">Clear</div>
  </div>
</div>

<script>
const COLORS = { Person:'#7F77DD', Skill:'#1D9E75', Place:'#BA7517', Org:'#D85A30', Unknown:'#888780' };

let graph = { nodes: {}, edges: [] };
let turns = 0;
let lastExtracted = [];

function add(id, label, type) {
  id = id.charAt(0).toUpperCase()+id.slice(1);
  if (!graph.nodes[id]) graph.nodes[id] = { label, type };
  return id;
}

function rel(a, type, b) {
  a = a.charAt(0).toUpperCase()+a.slice(1);
  b = b.charAt(0).toUpperCase()+b.slice(1);
  if (!graph.edges.find(e=>e.a===a&&e.type===type&&e.b===b)) {
    graph.edges.push({ a, type, b });
    lastExtracted.push({ a, type, b });
  }
}

function extract(text) {
  lastExtracted = [];
  const lower = text.toLowerCase();

  if (lower.includes("live in")) {
    const place = text.split("live in")[1].trim();
    add("Me","Me","Person");
    add(place,place,"Place");
    rel("Me","LIVES_IN",place);
  }

  if (lower.includes("work at")) {
    const org = text.split("work at")[1].trim();
    add("Me","Me","Person");
    add(org,org,"Org");
    rel("Me","WORKS_AT",org);
  }

  if (lower.includes("know")) {
    const skills = text.split("know")[1].split(",");
    skills.forEach(s=>{
      s=s.trim();
      add(s,s,"Skill");
      rel("Me","HAS_SKILL",s);
    });
  }
}

function pushMsg(role, text) {
  const div = document.getElementById('chat');
  const m = document.createElement('div');
  m.className = 'msg ' + role;
  m.textContent = text;
  div.appendChild(m);
  div.scrollTop = div.scrollHeight;
}

function updateStats() {
  document.getElementById('sn').textContent = Object.keys(graph.nodes).length;
  document.getElementById('se').textContent = graph.edges.length;
  document.getElementById('st').textContent = turns;
}

function drawGraph() {
  const canvas = document.getElementById('gc');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const nodes = Object.entries(graph.nodes);
  const cx = canvas.width/2;
  const cy = canvas.height/2;
  const r = 100;

  nodes.forEach(([id,n],i)=>{
    const angle = (2*Math.PI*i/nodes.length);
    const x = cx + r*Math.cos(angle);
    const y = cy + r*Math.sin(angle);

    ctx.beginPath();
    ctx.arc(x,y,20,0,2*Math.PI);
    ctx.fillStyle = COLORS[n.type]||COLORS.Unknown;
    ctx.fill();
    ctx.fillStyle="#fff";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(n.label,x,y);
  });
}

function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value='';
  turns++;
  pushMsg('user',text);
  extract(text);
  pushMsg('ai',"Stored in graph memory.");
  updateStats();
  drawGraph();
}

function reset(){
  graph = { nodes:{}, edges:[] };
  turns=0;
  document.getElementById('chat').innerHTML='';
  updateStats();
  drawGraph();
}

drawGraph();
</script>

</body>
</html>
